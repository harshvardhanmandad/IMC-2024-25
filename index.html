<style>/* design-system/colors_and_type.css (inlined) */
/* ============================================================
   MathAI — Color & Type Foundations
   Source: Product Development MathAI / mathai-design-guidelines.md
   ============================================================ */

:root {
  /* ── Core brand colors ─────────────────────────────────── */
  --mai-purple:        #270F36;   /* Primary text, deep brand */
  --mai-cream:         #FAF1F0;   /* App background */
  --mai-white:         #FFFFFF;   /* Cards */
  --mai-yellow:        #FFDE49;   /* Primary action */
  --mai-yellow-amber:  #FFC107;   /* Yellow gradient end */
  --mai-yellow-light:  #FCF6D7;   /* Soft yellow tint */
  --mai-coral:         #F96B4C;   /* Avatar core, accent */
  --mai-blue:          #000FFF;   /* Sheet titles, links */

  /* ── Semantic ──────────────────────────────────────────── */
  --mai-success:       #1DAE69;   /* Solid success */
  --mai-success-grad-1:#10B981;   /* Modern success grad start */
  --mai-success-grad-2:#059669;   /* Modern success grad end */
  --mai-success-bg:    #F1FBF8;
  --mai-success-bg-2:  #E8F9F4;
  --mai-error:         #FB7D7D;   /* Pending / soft error */
  --mai-danger:        #DC2626;   /* Hard alert (trial ending) */
  --mai-danger-2:      #B91C1C;
  --mai-warn:          #F59E0B;   /* Catch-up amber */
  --mai-warn-2:        #D97706;

  /* ── Text on cream ─────────────────────────────────────── */
  --mai-fg-1:          #270F36;                     /* primary */
  --mai-fg-2:          rgba(39, 15, 54, 0.7);       /* secondary */
  --mai-fg-3:          rgba(39, 15, 54, 0.5);       /* tertiary, captions */
  --mai-fg-4:          rgba(39, 15, 54, 0.4);       /* labels, eyebrows */

  /* ── Neutrals / borders ────────────────────────────────── */
  --mai-gray-50:       #F7FAFC;
  --mai-gray-100:      #EDF2F7;
  --mai-gray-200:      #E2E8F0;
  --mai-gray-300:      #F0F0F0;
  --mai-gray-600:      #718096;
  --mai-border-soft:   rgba(39, 15, 54, 0.04);
  --mai-border:        rgba(39, 15, 54, 0.08);

  /* ── Social colors ─────────────────────────────────────── */
  --mai-whatsapp:      #25D366;
  --mai-email:         #EA4335;
  --mai-sms:           #007AFF;

  /* ── Gradients ─────────────────────────────────────────── */
  --mai-grad-yellow:    linear-gradient(135deg, #FFDE49 0%, #FCF6D7 100%);
  --mai-grad-yellow-2:  linear-gradient(145deg, #FFDE49 0%, #FFC107 100%);
  --mai-grad-success:   linear-gradient(135deg, #F1FBF8 0%, #E8F9F4 100%);
  --mai-grad-success-2: linear-gradient(145deg, #10B981 0%, #059669 100%);
  --mai-grad-warn:      linear-gradient(145deg, #F59E0B 0%, #D97706 100%);
  --mai-grad-danger:    linear-gradient(135deg, #DC2626 0%, #B91C1C 100%);
  --mai-grad-cream:     linear-gradient(180deg, #FAF1F0 0%, #F5E6E4 100%);

  /* ── Type ──────────────────────────────────────────────── */
  --mai-font: 'Epilogue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

  /* ─────────────────────────────────────────────────────────
     CANONICAL TYPE SCALE (Figma-locked, 10 tokens)
     Each row maps to a Figma style. Use the .mai-* class below
     in markup; the raw size/weight vars are exposed for one-off
     compositions.

     Figma name              CSS class            Var           Use
     ──────────────────────  ──────────────────   ───────────   ──────────────────────────
     Display 1   24/700/-5%  .mai-title           --mai-title   page title
     Display 2   20/700/-2%  .mai-heading         --mai-heading card heading, greeting name
     Display 3   14/700       .mai-label           --mai-label   strong label, button text
     Display 4   12/700       .mai-overline        --mai-overline eyebrow, tab label
     Body Lg Reg 18/400       .mai-body-lg         --mai-body-lg lead paragraph
     Body Lg Bld 18/700       .mai-body-lg-bold    --mai-body-lg-bold lead emphasis
     Body Df Reg 14/400       .mai-body            --mai-body    default body
     Body Df Bld 14/700       .mai-body-bold       --mai-body-bold body emphasis
     Body Sm Reg 12/400       .mai-caption         --mai-caption helper, metadata
     Body Sm Bld 12/700       .mai-caption-bold    --mai-caption-bold strong metadata
     ───────────────────────────────────────────────────────── */
  --mai-fs-title:    24px;   --mai-lh-title:    120%;   --mai-tracking-title:   -0.05em;
  --mai-fs-heading:  20px;   --mai-lh-heading:  120%;   --mai-tracking-heading: -0.02em;
  --mai-fs-label:    14px;   --mai-lh-label:    120%;
  --mai-fs-overline: 12px;   --mai-lh-overline: 120%;
  --mai-fs-body-lg:  18px;   --mai-lh-body-lg:  150%;
  --mai-fs-body:     14px;   --mai-lh-body:     150%;
  --mai-fs-caption:  12px;   --mai-lh-caption:  120%;

  /* Hero extensions — in-product only. NOT in Figma type scale.
     Reserved for stat numerals (247, 5, 4, 3) and the "MathAI"
     splash wordmark. If you reach for a "big number," you want
     one of these; otherwise stick to the 10 tokens above. */
  --mai-fs-numeral:    32px;   /* big stat counters, hero numbers */
  --mai-fs-numeral-sm: 22px;   /* compressed numerals in 4-col stat grids */
  --mai-fs-wordmark:   32px;   /* "MathAI" splash logo */

  /* Micro labels — off-Figma. Used only when a 4+ column UI strip
     can't fit a 12px overline (calendar day labels, bottom-nav
     labels, stat captions). Treat as a last resort. */
  --mai-fs-micro:    10px;

  /* Weights */
  --mai-fw-regular:  400;
  --mai-fw-medium:   500;
  --mai-fw-semi:     600;
  --mai-fw-bold:     700;
  --mai-fw-xbold:    800;
  --mai-fw-black:    900;

  /* ── Spacing (8px grid) ────────────────────────────────── */
  --mai-space-4:  4px;
  --mai-space-6:  6px;
  --mai-space-8:  8px;
  --mai-space-10: 10px;
  --mai-space-12: 12px;
  --mai-space-14: 14px;
  --mai-space-16: 16px;
  --mai-space-18: 18px;
  --mai-space-20: 20px;
  --mai-space-24: 24px;
  --mai-space-28: 28px;
  --mai-space-32: 32px;

  /* ── Radii ─────────────────────────────────────────────── */
  --mai-radius-xs:  10px;   /* small btns, progress bar */
  --mai-radius-sm:  12px;   /* buttons, small cards */
  --mai-radius-md:  14px;   /* standard cards */
  --mai-radius-lg:  16px;   /* medium cards */
  --mai-radius-xl:  18px;   /* stats cards */
  --mai-radius-2xl: 20px;   /* hero cards */
  --mai-radius-3xl: 24px;   /* sheet top */
  --mai-radius-full: 9999px;

  /* ── Shadows ───────────────────────────────────────────── */
  --mai-shadow-xs:        0 2px 4px rgba(0,0,0,0.06);
  --mai-shadow-sm:        0 2px 8px rgba(0,0,0,0.06);
  --mai-shadow-card:      0 2px 8px rgba(39, 15, 54, 0.04);
  --mai-shadow-md:        0 4px 16px rgba(39, 15, 54, 0.06);
  --mai-shadow-yellow:    0 4px 12px rgba(255, 222, 73, 0.30);
  --mai-shadow-yellow-2:  0 4px 16px rgba(255, 222, 73, 0.35);
  --mai-shadow-success:   0 4px 12px rgba(29, 174, 105, 0.15);
  --mai-shadow-success-2: 0 4px 16px rgba(16, 185, 129, 0.35);
  --mai-shadow-warn:      0 4px 16px rgba(245, 158, 11, 0.35);
  --mai-shadow-nav:       0 -4px 20px rgba(39, 15, 54, 0.06);
}

/* ============================================================
   Base reset + typography
   ============================================================ */
html, body {
  font-family: var(--mai-font);
  color: var(--mai-fg-1);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── Canonical type classes (Figma-locked) ─────────────── */
.mai-title         { font-family: var(--mai-font); font-size: var(--mai-fs-title);    font-weight: 700; line-height: 120%; letter-spacing: -0.05em; color: var(--mai-fg-1); }
.mai-heading       { font-family: var(--mai-font); font-size: var(--mai-fs-heading);  font-weight: 700; line-height: 120%; letter-spacing: -0.02em; color: var(--mai-fg-1); }
.mai-label         { font-family: var(--mai-font); font-size: var(--mai-fs-label);    font-weight: 700; line-height: 120%; letter-spacing: 0;        color: var(--mai-fg-1); }
.mai-overline      { font-family: var(--mai-font); font-size: var(--mai-fs-overline); font-weight: 700; line-height: 120%; letter-spacing: 0;        color: var(--mai-fg-1); }

.mai-body-lg       { font-family: var(--mai-font); font-size: var(--mai-fs-body-lg);  font-weight: 400; line-height: 150%; color: var(--mai-fg-1); }
.mai-body-lg-bold  { font-family: var(--mai-font); font-size: var(--mai-fs-body-lg);  font-weight: 700; line-height: 150%; color: var(--mai-fg-1); }
.mai-body          { font-family: var(--mai-font); font-size: var(--mai-fs-body);     font-weight: 400; line-height: 150%; color: var(--mai-fg-1); }
.mai-body-bold     { font-family: var(--mai-font); font-size: var(--mai-fs-body);     font-weight: 700; line-height: 150%; color: var(--mai-fg-1); }
.mai-caption       { font-family: var(--mai-font); font-size: var(--mai-fs-caption);  font-weight: 400; line-height: 120%; color: var(--mai-fg-2); }
.mai-caption-bold  { font-family: var(--mai-font); font-size: var(--mai-fs-caption);  font-weight: 700; line-height: 120%; color: var(--mai-fg-1); }

/* Hero extensions — for stat numerals and the splash wordmark only */
.mai-numeral       { font-family: var(--mai-font); font-size: var(--mai-fs-numeral);    font-weight: 800; line-height: 100%; letter-spacing: -0.04em; color: var(--mai-fg-1); }
.mai-numeral-sm    { font-family: var(--mai-font); font-size: var(--mai-fs-numeral-sm); font-weight: 800; line-height: 100%; letter-spacing: -0.03em; color: var(--mai-fg-1); }
.mai-wordmark      { font-family: var(--mai-font); font-size: var(--mai-fs-wordmark);   font-weight: 800; line-height: 100%; letter-spacing: -0.04em; color: var(--mai-fg-1); }

/* Micro labels — off-Figma fallback for cramped 4+ column UI strips */
.mai-micro         { font-family: var(--mai-font); font-size: var(--mai-fs-micro);      font-weight: 700; line-height: 120%; letter-spacing: 0.05em; text-transform: uppercase; color: var(--mai-fg-1); }

/* Mono is a utility, not a brand token */
.mai-mono          { font-family: 'SF Mono', Monaco, 'Inconsolata', monospace; font-size: 13px; }

/* Inline emphasis */
.mai-strong        { font-weight: 700; color: var(--mai-fg-1); }
.mai-accent        { color: var(--mai-coral); font-weight: 800; }
.mai-link          { color: var(--mai-blue); text-decoration: none; font-weight: 600; }

/* ── Animations referenced across the system ───────────── */
@keyframes mai-float {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-10px); }
}
@keyframes mai-breathe {
  0%, 100% { transform: scale(1); }
  50%      { transform: scale(1.04); }
}
@keyframes mai-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.5; transform: scale(1.2); }
}
@keyframes mai-fade-up {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* app/styles.css (inlined) */
/* ============================================================
   IMC Landing Page — bespoke styles on top of MathAI tokens
   ============================================================ */

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--mai-cream);
  color: var(--mai-fg-1);
  font-family: var(--mai-font);
  -webkit-font-smoothing: antialiased;
}
img, svg { display: block; max-width: 100%; }
button { font-family: inherit; }

/* Layout */
.imc-shell { max-width: 1200px; margin: 0 auto; padding: 0 32px; }
@media (max-width: 1024px) { .imc-shell { padding: 0 28px; } }
@media (max-width: 640px) { .imc-shell { padding: 0 20px; } }
@media (max-width: 380px) { .imc-shell { padding: 0 16px; } }

/* ── NAV ────────────────────────────────────────────────── */
.imc-nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(250,241,240,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--mai-border);
}
.imc-nav-inner {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 14px; padding-bottom: 14px;
}
.imc-logo { display: flex; align-items: center; gap: 10px; }
.imc-logo-mark { position: relative; width: 32px; height: 32px; flex-shrink: 0; }
.imc-logo-mark .core { width: 26px; height: 26px; border-radius: 50%; background: var(--mai-coral); animation: mai-breathe 3s ease-in-out infinite; }
.imc-logo-mark .companion { position: absolute; bottom: 0; right: 0; width: 10px; height: 10px; background: var(--mai-yellow); border-radius: 2px; animation: mai-breathe 3s ease-in-out infinite 0.3s; }
.imc-logo-text { font-size: 22px; font-weight: 800; letter-spacing: -0.04em; }
.imc-logo-text .ai { color: var(--mai-coral); }
.imc-nav-links { display: flex; gap: 24px; align-items: center; }
.imc-nav-links a { font-size: 13px; font-weight: 600; color: var(--mai-fg-2); text-decoration: none; }
.imc-nav-links a:hover { color: var(--mai-fg-1); }
@media (max-width: 800px) { .imc-nav-links { display: none; } }

.imc-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 12px 20px; border: 0; border-radius: var(--mai-radius-sm);
  font-weight: 700; font-size: 14px; cursor: pointer;
  font-family: var(--mai-font); transition: transform 0.15s ease, box-shadow 0.2s ease;
  text-decoration: none;
}
.imc-btn:active { transform: scale(0.98); }
.imc-btn-primary {
  background: var(--mai-yellow); color: var(--mai-purple);
  box-shadow: var(--mai-shadow-yellow);
}
.imc-btn-primary:hover { box-shadow: var(--mai-shadow-yellow-2); }
.imc-btn-ghost {
  background: transparent; color: var(--mai-fg-1);
  border: 1.5px solid var(--mai-border);
}
.imc-btn-ghost:hover { background: var(--mai-white); }
.imc-btn-dark {
  background: var(--mai-purple); color: var(--mai-white);
}

/* ── EYEBROW & SECTION HEADERS ──────────────────────────── */
.imc-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 14px; border-radius: 9999px;
  background: var(--mai-white); border: 1px solid var(--mai-border);
  font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--mai-fg-2);
}
.imc-eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--mai-coral); animation: mai-pulse 2s ease-in-out infinite; }
.imc-section-eyebrow {
  font-size: 12px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--mai-coral); margin-bottom: 12px;
}
.imc-h1 {
  font-size: clamp(40px, 7vw, 84px); font-weight: 800; line-height: 0.98; letter-spacing: -0.04em;
  margin: 16px 0 0;
}
.imc-h1 .accent { color: var(--mai-coral); }
.imc-h1 .yellow {
  background: linear-gradient(135deg, #FFDE49 0%, #FFC107 100%);
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.imc-h2 {
  font-size: clamp(28px, 4vw, 44px); font-weight: 800; line-height: 1.05; letter-spacing: -0.03em;
  margin: 8px 0 0;
}
.imc-h3 {
  font-size: clamp(20px, 2.5vw, 26px); font-weight: 800; line-height: 1.1; letter-spacing: -0.02em;
}
.imc-lede {
  font-size: clamp(15px, 1.5vw, 18px); line-height: 1.55; color: var(--mai-fg-2);
  max-width: 60ch; margin-top: 14px;
}

/* ── HERO ───────────────────────────────────────────────── */
.imc-hero {
  position: relative; padding: 72px 0 96px; overflow: hidden;
}
.imc-hero-bg {
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse at 80% 0%, rgba(255,222,73,0.4) 0%, transparent 50%),
    radial-gradient(ellipse at 0% 100%, rgba(249,107,76,0.15) 0%, transparent 50%);
}
.imc-hero-inner { position: relative; z-index: 1; }

/* hero 2-col layout with art on the right */
.imc-hero-grid {
  display: grid; grid-template-columns: 1.05fr 1fr;
  gap: 56px; align-items: center;
}
@media (max-width: 960px) {
  .imc-hero-grid { grid-template-columns: 1fr; gap: 36px; }
}
.imc-hero-copy { display: flex; flex-direction: column; gap: 0; }

.imc-hero-art {
  position: relative;
  display: flex; justify-content: center; align-items: center;
}
.imc-hero-art-frame {
  position: relative;
  width: 100%; max-width: 440px;
  aspect-ratio: 1 / 1;
  border-radius: 24px; overflow: hidden;
  background: linear-gradient(140deg, #FFEAD3 0%, #FFD2B0 100%);
  box-shadow:
    0 22px 44px -22px rgba(249, 107, 76, 0.42),
    0 8px 18px -10px rgba(43, 13, 75, 0.14),
    inset 0 0 0 1px rgba(255, 255, 255, 0.5);
  transform: rotate(-1.5deg);
  opacity: 1;
}
.imc-hero-art-frame img {
  width: 100%; height: 100%; display: block;
  object-fit: cover;
  /* moderate desaturation — keeps warmth but blends with palette */
  filter: saturate(0.78) contrast(1.0) brightness(1.02);
  mix-blend-mode: multiply;
  opacity: 1;
}
.imc-hero-art-frame::before {
  content:""; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(255, 230, 195, 0.30) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 90%, rgba(249, 107, 76, 0.15) 0%, transparent 60%);
  mix-blend-mode: screen;
  pointer-events: none;
  z-index: 1;
}
.imc-hero-art-glow {
  position: absolute; inset: -34px; z-index: -1;
  background: radial-gradient(ellipse at center, rgba(249, 107, 76, 0.24) 0%, transparent 65%);
  filter: blur(40px);
}

/* floating badge */
.imc-hero-art-badge {
  position: absolute;
  bottom: -16px; left: -8px;
  background: var(--mai-purple); color: var(--mai-white);
  border-radius: 18px; padding: 14px 20px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 14px 30px -12px rgba(43, 13, 75, 0.5);
  transform: rotate(-4deg);
  z-index: 2;
}
.imc-hero-art-badge-num {
  font-size: 36px; font-weight: 800; line-height: 1;
  letter-spacing: -0.04em;
  color: var(--mai-yellow, #FFD37A);
}
.imc-hero-art-badge-label {
  font-size: 11px; font-weight: 700; line-height: 1.2;
  text-transform: uppercase; letter-spacing: 0.08em;
  opacity: 0.85;
}

@media (max-width: 960px) {
  .imc-hero-art-frame { max-width: 380px; transform: rotate(-1.5deg); }
  .imc-hero-art-badge { bottom: -12px; left: 8px; }
}

.imc-hero-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  margin-top: 36px; max-width: 720px;
}
.imc-stat {
  background: var(--mai-white); border: 1px solid var(--mai-border-soft);
  border-radius: var(--mai-radius-lg); padding: 18px 20px;
  box-shadow: var(--mai-shadow-card);
}
.imc-stat-num { font-size: 32px; font-weight: 800; letter-spacing: -0.04em; line-height: 1; color: var(--mai-purple); }
.imc-stat-label { font-size: 12px; font-weight: 600; color: var(--mai-fg-3); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
@media (max-width: 640px) {
  .imc-hero { padding: 40px 0 56px; }
  .imc-hero-stats { gap: 8px; }
  .imc-stat { padding: 14px; }
  .imc-stat-num { font-size: 22px; }
}
.imc-hero-actions { display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap; }

/* Floating math glyphs in hero */
.imc-glyph { position: absolute; font-weight: 800; font-size: 80px; color: var(--mai-purple); opacity: 0.05; animation: mai-float 4s ease-in-out infinite; pointer-events: none; }

/* ── CONFETTI (CSS-only, performant) ────────────────────── */
.imc-confetti { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 1; }
.imc-confetti span {
  position: absolute; width: 8px; height: 12px; top: -20px;
  animation: imc-fall linear infinite;
}
@keyframes imc-fall {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(120vh) rotate(720deg); opacity: 0; }
}

/* ── GRADE SWITCHER ─────────────────────────────────────── */
.imc-grade-sticky {
  position: sticky;
  top: 0;
  z-index: 50;
  padding: 12px 0;
  background: rgba(252, 244, 240, 0.85);
  backdrop-filter: saturate(140%) blur(10px);
  -webkit-backdrop-filter: saturate(140%) blur(10px);
  border-bottom: 1px solid var(--mai-border-soft);
}
.imc-grade-sticky-inner { display: flex; justify-content: center; }
.imc-tabs {
  display: inline-flex; gap: 4px; padding: 4px; border-radius: 9999px;
  background: var(--mai-white); border: 1px solid var(--mai-border);
  box-shadow: var(--mai-shadow-card);
}
.imc-tab {
  padding: 8px 22px; border: 0; background: transparent; cursor: pointer;
  font-family: var(--mai-font); font-weight: 700; font-size: 14px;
  border-radius: 9999px; color: var(--mai-fg-2); transition: all 0.2s;
  display: flex; flex-direction: column; align-items: center; gap: 1px;
  line-height: 1.1;
}
.imc-tab .imc-tab-grade { font-size: 14px; font-weight: 700; }
.imc-tab .imc-tab-ay { font-size: 10px; font-weight: 600; opacity: 0.65; letter-spacing: 0.04em; }
.imc-tab[aria-selected="true"] { background: var(--mai-purple); color: var(--mai-white); }
.imc-tab[aria-selected="true"] .imc-tab-ay { opacity: 0.7; }

/* ── PODIUM ─────────────────────────────────────────────── */
.imc-podium-section { padding: 80px 0 60px; position: relative; }
.imc-podium {
  display: grid; grid-template-columns: 1fr 1.25fr 1fr; gap: 20px;
  align-items: end; margin-top: 40px;
}
.imc-podium-card {
  background: var(--mai-white); border-radius: 20px; padding: 24px;
  border: 1px solid var(--mai-border-soft);
  box-shadow: var(--mai-shadow-md);
  display: flex; flex-direction: column; align-items: center; text-align: center;
  position: relative;
}
.imc-podium-card.gold {
  background: linear-gradient(165deg, #FFE684 0%, #FFC107 100%);
  box-shadow: 0 12px 32px rgba(255, 193, 7, 0.35);
  transform: translateY(-20px);
}
.imc-podium-card.silver { background: linear-gradient(165deg, #FAF1F0 0%, #E8E0DF 100%); }
.imc-podium-card.bronze { background: linear-gradient(165deg, #FFE4D6 0%, #F7C9B0 100%); }
.imc-podium-rank {
  position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
  background: var(--mai-purple); color: var(--mai-white);
  font-weight: 800; font-size: 14px; letter-spacing: 0.1em;
  padding: 6px 16px; border-radius: 9999px;
}
.imc-podium-card.gold .imc-podium-rank { background: var(--mai-purple); }
.imc-podium-medal {
  font-size: 56px; line-height: 1; margin-bottom: 4px;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
}
.imc-podium-card.gold .imc-podium-medal { font-size: 72px; }
.imc-podium-prize {
  width: 100%; aspect-ratio: 5/6; border-radius: 14px; overflow: hidden;
  margin-top: 12px;
  background: #FFFFFF;
  box-shadow: inset 0 0 0 1px rgba(39,15,54,0.06), 0 1px 2px rgba(39,15,54,0.04);
  display: flex; align-items: center; justify-content: center;
  padding: 10%;
}
.imc-podium-prize img { max-width: 100%; max-height: 100%; width: auto; height: auto; object-fit: contain; }
.imc-podium-name {
  font-size: clamp(18px, 2.2vw, 24px); font-weight: 800; letter-spacing: -0.02em;
  margin-top: 16px; color: var(--mai-purple);
}
.imc-podium-school { font-size: 13px; color: var(--mai-fg-2); margin-top: 4px; line-height: 1.4; }
.imc-podium-divider { height: 1px; width: 60%; background: rgba(39,15,54,0.15); margin: 16px auto; }
.imc-podium-prize-name { font-size: 14px; font-weight: 700; color: var(--mai-purple); }
.imc-podium-prize-extras { font-size: 12px; color: var(--mai-fg-2); margin-top: 4px; }

@media (max-width: 800px) {
  .imc-podium { grid-template-columns: 1fr; gap: 16px; }
  .imc-podium-card.gold { transform: none; order: -1; }
}

/* ── TOP 100 — TIERED WALL ──────────────────────────────── */
.imc-top100-section { padding: 80px 0; background: var(--mai-white); border-top: 1px solid var(--mai-border-soft); border-bottom: 1px solid var(--mai-border-soft); }
.imc-tier { margin-top: 24px; border-radius: 18px; overflow: hidden; border: 1px solid var(--mai-border); }
.imc-tier-header {
  padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; gap: 16px;
  flex-wrap: wrap;
}
.imc-tier-header strong { font-size: 16px; letter-spacing: 0.08em; font-weight: 800; }
.imc-tier-header .desc { font-size: 13px; opacity: 0.85; font-weight: 500; }
.imc-tier-podium .imc-tier-header { background: linear-gradient(135deg, #270F36 0%, #4A2466 100%); color: var(--mai-white); }
.imc-tier-top10 .imc-tier-header { background: linear-gradient(135deg, #FFE684 0%, #FFC107 100%); color: var(--mai-purple); }
.imc-tier-top25 .imc-tier-header { background: linear-gradient(135deg, #FFE4D6 0%, #FCB89C 100%); color: var(--mai-purple); }
.imc-tier-top50 .imc-tier-header { background: linear-gradient(135deg, #F1FBF8 0%, #BFEAD9 100%); color: var(--mai-purple); }
.imc-tier-top100 .imc-tier-header { background: linear-gradient(135deg, #FAF1F0 0%, #ECE0DE 100%); color: var(--mai-purple); }

.imc-tier-rows { display: grid; grid-template-columns: repeat(2, 1fr); }
.imc-tier-podium .imc-tier-rows, .imc-tier-top10 .imc-tier-rows { grid-template-columns: 1fr; }
@media (max-width: 800px) { .imc-tier-rows { grid-template-columns: 1fr; } }

.imc-row {
  display: grid; grid-template-columns: 40px 1fr 160px; gap: 18px;
  align-items: center; padding: 16px 22px;
  background: var(--mai-white);
  border-top: 1px solid var(--mai-border-soft);
}
.imc-tier-rows > .imc-row:nth-child(odd) { border-right: 1px solid var(--mai-border-soft); }
.imc-tier-podium .imc-row,
.imc-tier-top10 .imc-row,
.imc-cw-tier-champ .imc-row,
.imc-cw-tier-top3 .imc-row { border-right: none; }
.imc-row-rank {
  font-size: 13px; font-weight: 700;
  letter-spacing: 0; color: var(--mai-fg-3);
  font-variant-numeric: tabular-nums;
  text-align: right;
  padding-right: 4px;
}
.imc-row-thumb {
  width: 64px; height: 64px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  background: #FFFFFF;
  border: 1px solid var(--mai-border-soft);
  overflow: hidden; flex-shrink: 0;
  margin: 0 auto 8px;
}
.imc-row-thumb.credit {
  background: linear-gradient(145deg, #FAF1F0 0%, #F5E6E4 100%);
  border-color: transparent;
}
.imc-row-thumb img { max-width: 100%; max-height: 100%; width: auto; height: auto; object-fit: contain; padding: 6px; }
.imc-row-thumb.credit img { padding: 4px; }
.imc-row-meta { min-width: 0; }
.imc-row-name { font-size: 16px; font-weight: 700; color: var(--mai-purple); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.01em; }
.imc-row-school { font-size: 13px; color: var(--mai-fg-3); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.imc-row-prize { text-align: center; min-width: 0; }
.imc-row-prize-name { font-size: 13px; font-weight: 700; color: var(--mai-purple); line-height: 1.25; word-break: break-word; overflow-wrap: anywhere; hyphens: auto; }
.imc-row-prize-sub { font-size: 11px; color: var(--mai-fg-3); margin-top: 2px; line-height: 1.3; }
@media (max-width: 900px) {
  .imc-row { grid-template-columns: 36px 1fr 120px; gap: 14px; padding: 14px 18px; }
  .imc-row-prize-name { font-size: 12px; }
  .imc-row-prize-sub { font-size: 10px; }
  .imc-row-thumb { width: 56px; height: 56px; }
}
@media (max-width: 720px) {
  .imc-row { grid-template-columns: 30px 1fr 100px; gap: 12px; padding: 12px 14px; }
  .imc-row-rank { font-size: 13px; }
  .imc-row-thumb { width: 44px; height: 44px; margin: 0 auto 4px; }
  .imc-row-name { font-size: 14px; }
  .imc-row-school { font-size: 11px; }
  .imc-row-prize-sub { display: none; }
}
@media (max-width: 540px) {
  .imc-row { grid-template-columns: 26px 1fr 84px; gap: 10px; padding: 12px; }
  .imc-row-rank { font-size: 12px; }
  .imc-row-thumb { width: 40px; height: 40px; margin: 0 auto 4px; }
  .imc-row-name { font-size: 14px; white-space: normal; overflow: visible; }
  .imc-row-school { font-size: 11px; white-space: normal; overflow: visible; line-height: 1.3; }
  .imc-row-prize-name { font-size: 11px; line-height: 1.2; }
  .imc-row-prize-sub { display: none; }
}

.imc-tier-collapsed .imc-tier-rows { display: none; }
.imc-tier-toggle {
  width: 100%; padding: 12px; background: transparent; border: 0; border-top: 1px solid var(--mai-border-soft);
  font-family: var(--mai-font); font-weight: 700; font-size: 13px; color: var(--mai-fg-2); cursor: pointer;
}
.imc-tier-toggle:hover { background: var(--mai-cream); }


/* ── PRIZE SHOWCASE ─────────────────────────────────────── */
.imc-prizes-section { padding: 80px 0; background: var(--mai-white); border-top: 1px solid var(--mai-border-soft); border-bottom: 1px solid var(--mai-border-soft); }
.imc-prize-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 16px; margin-top: 36px; grid-template-rows: auto auto; }
.imc-prize-card {
  border-radius: 20px; overflow: hidden; padding: 28px;
  display: flex; flex-direction: column; gap: 16px;
  position: relative; min-height: 340px;
}
.imc-prize-card.feature { grid-row: 1 / 3; padding: 36px; }
.imc-prize-card .label { font-size: 12px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; }
.imc-prize-card h3 { font-size: clamp(20px, 2vw, 28px); font-weight: 800; letter-spacing: -0.02em; margin: 0; }
.imc-prize-card .img-wrap { flex: 1; border-radius: 14px; overflow: hidden; min-height: 120px; background: #FFFFFF; display: flex; align-items: center; justify-content: center; padding: 12px; }
.imc-prize-card .img-wrap img { max-width: 100%; max-height: 100%; width: auto; height: auto; object-fit: contain; }
.imc-prize-card .meta { font-size: 13px; opacity: 0.85; }

.imc-prize-card.gold { background: linear-gradient(150deg, #FFE684 0%, #FFC107 100%); color: var(--mai-purple); }
.imc-prize-card.silver { background: linear-gradient(150deg, #FAF1F0 0%, #D8D0CF 100%); color: var(--mai-purple); }
.imc-prize-card.bronze { background: linear-gradient(150deg, #FFE4D6 0%, #E8B095 100%); color: var(--mai-purple); }
.imc-prize-card.top10 { background: linear-gradient(150deg, #270F36 0%, #4A2466 100%); color: var(--mai-white); }
.imc-prize-card.challenge { background: linear-gradient(150deg, #F1FBF8 0%, #BFEAD9 100%); color: var(--mai-purple); }

@media (max-width: 800px) {
  .imc-prize-grid { grid-template-columns: 1fr; }
  .imc-prize-card.feature { grid-row: auto; }
}

/* ── 5 CHALLENGES ───────────────────────────────────────── */
.imc-challenges-section { padding: 80px 0; }

/* Per-challenge prize ladder — now embedded in drawer head */
.imc-cw-drawer-ladder {
  display: flex; flex-direction: column; gap: 8px;
  background: rgba(255,255,255,0.6);
  border: 1px solid var(--mai-border-soft);
  border-radius: 12px; padding: 12px 14px;
  min-width: 280px;
}
.imc-cw-drawer-ladder-label {
  font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--mai-fg-3);
}
.imc-cw-drawer-ladder-row {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.imc-cw-drawer-ladder-row .rung {
  font-size: 12px; padding: 5px 10px; border-radius: 9999px;
  background: var(--mai-cream); color: var(--mai-fg-2);
  border: 1px solid var(--mai-border-soft);
  white-space: nowrap;
}
.imc-cw-drawer-ladder-row .rung b { color: var(--mai-purple); font-weight: 800; margin-right: 4px; }
.imc-cw-drawer-ladder-row .rung.champ {
  background: var(--mai-purple); color: var(--mai-white); border-color: var(--mai-purple);
}
.imc-cw-drawer-ladder-row .rung.champ b { color: var(--mai-yellow); }
@media (max-width: 720px) {
  .imc-cw-drawer-ladder { min-width: 0; width: 100%; }
}

/* ── Challenge drawer as full-screen modal on mobile ─────────────────── */
.imc-cw-modal-backdrop {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(45, 27, 78, 0.55);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: flex; align-items: stretch; justify-content: stretch;
  animation: imc-cw-modal-fade 180ms ease-out;
}
@keyframes imc-cw-modal-fade {
  from { opacity: 0; }
  to   { opacity: 1; }
}
.imc-cw-modal-sheet {
  position: relative;
  width: 100%; height: 100%;
  background: var(--mai-cream);
  display: flex; flex-direction: column;
  animation: imc-cw-modal-slide 220ms cubic-bezier(0.32, 0.72, 0, 1);
}
@keyframes imc-cw-modal-slide {
  from { transform: translateY(24px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.imc-cw-modal-bar {
  position: sticky; top: 0; z-index: 2;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  background: var(--mai-purple);
  color: var(--mai-white);
  border-bottom: 2px solid var(--mai-purple-deep);
  box-shadow: 0 2px 0 rgba(0,0,0,0.04);
}
.imc-cw-modal-bar-title {
  display: flex; align-items: center; gap: 10px;
  font-size: 14px; font-weight: 800;
  letter-spacing: -0.005em;
  min-width: 0;
}
.imc-cw-modal-bar-title .emoji {
  font-size: 22px; line-height: 1;
  filter: drop-shadow(0 1px 0 rgba(0,0,0,0.15));
}
.imc-cw-modal-bar-title > span:last-child {
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.imc-cw-modal-close {
  flex-shrink: 0;
  width: 36px; height: 36px;
  border-radius: 9999px;
  background: rgba(255,255,255,0.15);
  color: var(--mai-white);
  border: 1px solid rgba(255,255,255,0.25);
  font-size: 22px; line-height: 1;
  font-weight: 400;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background 120ms ease;
}
.imc-cw-modal-close:hover,
.imc-cw-modal-close:active {
  background: rgba(255,255,255,0.28);
}
.imc-cw-modal-body {
  flex: 1 1 0;
  min-height: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
  background: var(--mai-cream);
}
.imc-cw-modal-body > * + * { margin-top: 16px; }
/* Modal-specific drawer head — drop the duplicated emoji + tighten layout */
.imc-cw-modal-body .imc-cw-drawer-head {
  border-bottom: none;
  padding: 4px 4px 0;
  margin-bottom: 0;
  gap: 14px;
  display: flex; flex-direction: column; align-items: stretch;
}
.imc-cw-modal-body .imc-cw-drawer-title { gap: 0; align-items: flex-start; }
.imc-cw-modal-body .imc-cw-drawer-title > .emoji { display: none; } /* shown in top bar already */
.imc-cw-modal-body .imc-cw-drawer-title h3 {
  font-size: 18px; line-height: 1.2; letter-spacing: -0.01em;
}
.imc-cw-modal-body .imc-cw-drawer-title .eyebrow { font-size: 10px; }
.imc-cw-modal-body .imc-cw-drawer-ay { font-size: 10px; margin-top: 2px; }
.imc-cw-modal-body .imc-cw-drawer-ladder {
  background: var(--mai-white);
  border: 1px solid var(--mai-border-soft);
  min-width: 0; width: 100%;
}
/* Tier blocks: rounded, breathing room between them */
.imc-cw-modal-body .imc-tier {
  margin-top: 0;
  border-radius: 14px;
  overflow: hidden;
}
.imc-cw-modal-body .imc-tier-header {
  width: 100%;
  padding: 10px 14px;
  flex-direction: column; align-items: flex-start; gap: 2px;
  box-sizing: border-box;
}
.imc-cw-modal-body .imc-tier-header > div:first-child {
  display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
}
.imc-cw-modal-body .imc-tier-header strong { font-size: 12px; letter-spacing: 0.08em; }
.imc-cw-modal-body .imc-tier-header .desc { font-size: 11px; opacity: 0.85; line-height: 1.3; }
.imc-cw-modal-body .imc-tier { margin-bottom: 10px; }
.imc-cw-modal-body .imc-tier-rows { grid-template-columns: 1fr; }
.imc-cw-modal-body .imc-row {
  padding: 10px 12px;
  gap: 10px;
  grid-template-columns: 28px 1fr 76px;
  border-right: none !important;
}
.imc-cw-modal-body .imc-row-rank { font-size: 12px; }
.imc-cw-modal-body .imc-row-name { font-size: 13px; white-space: normal; overflow: visible; line-height: 1.25; }
.imc-cw-modal-body .imc-row-school { font-size: 11px; white-space: normal; overflow: visible; line-height: 1.3; }
.imc-cw-modal-body .imc-row-prize-name { font-size: 10px; line-height: 1.2; font-weight: 700; }
.imc-cw-modal-body .imc-row-prize-sub { display: none; }
.imc-cw-modal-body .imc-row-thumb { width: 34px; height: 34px; margin: 0 auto 3px; }

/* Active challenge card + inline drawer */
.imc-challenge-card[data-active="true"] {
  background: var(--mai-white);
  color: inherit;
  border: 2px solid var(--mai-yellow);
  transform: translateY(-4px);
  box-shadow: 0 12px 32px rgba(255,193,7,0.25);
  padding: 21px;
}
.imc-challenge-card[data-active="true"] p { color: var(--mai-fg-3); }
.imc-challenge-card[data-active="true"] .imc-challenge-card-num {
  background: var(--mai-yellow); color: var(--mai-purple);
}
.imc-challenge-card[data-active="true"] .imc-challenge-card-cta {
  background: var(--mai-purple); color: var(--mai-white);
}

.imc-cw-drawer {
  margin-top: 28px;
  border-radius: 22px;
  background: var(--mai-white);
  border: 1px solid var(--mai-border);
  box-shadow: var(--mai-shadow-md);
  padding: 28px;
  animation: imc-fade-up 0.3s ease;
}
@keyframes imc-fade-up {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.imc-cw-drawer-head {
  display: flex; justify-content: space-between; align-items: flex-start; gap: 20px;
  padding-bottom: 20px; margin-bottom: 12px; border-bottom: 1px solid var(--mai-border-soft);
  flex-wrap: wrap;
}
.imc-cw-drawer-title { display: flex; gap: 16px; align-items: center; }
.imc-cw-drawer-title .emoji { font-size: 36px; line-height: 1; }
.imc-cw-drawer-title .eyebrow {
  font-size: 11px; font-weight: 800; letter-spacing: 0.1em; color: var(--mai-coral);
  text-transform: uppercase; margin-bottom: 4px;
}
.imc-cw-drawer-title h3 {
  font-size: clamp(20px, 2.4vw, 26px); font-weight: 800;
  letter-spacing: -0.02em; margin: 0; color: var(--mai-purple);
}
.imc-cw-drawer-ay {
  font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
  color: var(--mai-fg-3); margin-top: 4px;
}
.imc-cw-drawer .imc-tier { margin-top: 14px; }

/* Per-tier headers in challenge drawer (warmer set than overall wall) */
.imc-cw-tier-champ .imc-tier-header { background: linear-gradient(135deg, #270F36 0%, #4A2466 100%); color: var(--mai-white); }
.imc-cw-tier-top3  .imc-tier-header { background: linear-gradient(135deg, #FFE684 0%, #FFC107 100%); color: var(--mai-purple); }
.imc-cw-tier-top10 .imc-tier-header { background: linear-gradient(135deg, #FFE4D6 0%, #FCB89C 100%); color: var(--mai-purple); }
.imc-cw-tier-top20 .imc-tier-header { background: linear-gradient(135deg, #FAF1F0 0%, #ECE0DE 100%); color: var(--mai-purple); }

.imc-cw-tier-champ .imc-tier-rows,
.imc-cw-tier-top3  .imc-tier-rows { grid-template-columns: 1fr; }
.imc-cw-tier-champ .imc-tier-rows > .imc-row,
.imc-cw-tier-top3  .imc-tier-rows > .imc-row { border-right: none; }

.imc-challenge-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-top: 36px; }
@media (max-width: 1000px) { .imc-challenge-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 540px) { .imc-challenge-grid { grid-template-columns: 1fr; } }
.imc-challenge-card {
  background: var(--mai-white); border: 1px solid var(--mai-border);
  border-radius: var(--mai-radius-xl); padding: 22px;
  cursor: pointer; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  display: flex; flex-direction: column; gap: 10px;
  text-align: left; font-family: var(--mai-font); color: inherit;
  position: relative;
}
.imc-challenge-card[data-active="true"] .imc-challenge-card-cta .chev,
.imc-challenge-card[data-active="true"] .imc-challenge-card-cta { color: var(--mai-white); }
.imc-challenge-card:hover { transform: translateY(-4px); box-shadow: var(--mai-shadow-md); border-color: var(--mai-yellow); }
.imc-challenge-card:hover .imc-challenge-card-cta { background: var(--mai-purple); color: var(--mai-white); }
.imc-challenge-card-top { display: flex; align-items: center; justify-content: space-between; }
.imc-challenge-card .emoji { font-size: 36px; line-height: 1; }
.imc-challenge-card-num {
  font-size: 10px; font-weight: 800; letter-spacing: 0.12em;
  color: var(--mai-coral); background: var(--mai-yellow-light);
  padding: 4px 8px; border-radius: 6px;
}
.imc-challenge-card h4 { font-size: 17px; font-weight: 800; margin: 0; letter-spacing: -0.01em; line-height: 1.2; }
.imc-challenge-card p { font-size: 13px; color: var(--mai-fg-3); margin: 0; line-height: 1.4; flex: 1; }
.imc-challenge-card-cta {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 800; padding: 8px 14px; border-radius: 9999px;
  background: var(--mai-yellow); color: var(--mai-purple);
  align-self: stretch; justify-content: center;
  margin-top: 4px;
  transition: background 0.2s, color 0.2s;
}
.imc-challenge-card-cta .chev { font-size: 9px; }
.imc-challenge-card[data-active="true"] .imc-challenge-card-num {
  background: rgba(255,193,7,0.2); color: var(--mai-yellow);
}
.imc-challenge-card[data-active="true"] .imc-challenge-card-cta {
  background: var(--mai-yellow); color: var(--mai-purple);
}

/* Modal for challenge mini-leaderboards */
.imc-modal-backdrop {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(39,15,54,0.6); backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px; animation: imc-fade 0.2s ease;
}
@keyframes imc-fade { from { opacity: 0; } to { opacity: 1; } }
.imc-modal {
  background: var(--mai-white); border-radius: 24px;
  max-width: 640px; width: 100%; max-height: 85vh; overflow: hidden;
  display: flex; flex-direction: column;
}
.imc-modal-head { padding: 24px 28px; border-bottom: 1px solid var(--mai-border-soft); display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
.imc-modal-head h3 { font-size: 22px; font-weight: 800; margin: 0; letter-spacing: -0.02em; }
.imc-modal-head .sub { font-size: 13px; color: var(--mai-fg-2); margin-top: 4px; }
.imc-modal-close { background: var(--mai-cream); border: 0; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; flex-shrink: 0; }
.imc-modal-body { overflow-y: auto; padding: 8px 0; }
.imc-mini-row { display: grid; grid-template-columns: 48px 1fr auto; gap: 12px; padding: 12px 28px; align-items: center; }
.imc-mini-row + .imc-mini-row { border-top: 1px solid var(--mai-border-soft); }
.imc-mini-row .rank { font-weight: 700; font-size: 13px; color: var(--mai-fg-3); font-variant-numeric: tabular-nums; }
.imc-mini-row .name { font-weight: 700; font-size: 14px; }
.imc-mini-row .school { font-size: 11px; color: var(--mai-fg-3); }
.imc-mini-row .pill { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 9999px; background: var(--mai-yellow-light); color: var(--mai-purple); white-space: nowrap; }
.imc-mini-row .pill-gold   { background: linear-gradient(135deg, #FFE684 0%, #FFC107 100%); color: var(--mai-purple); }
.imc-mini-row .pill-silver { background: #ECE0DE; color: var(--mai-purple); }
.imc-mini-row .pill-bronze { background: #FFE4D6; color: var(--mai-purple); }
.imc-mini-row .pill-plain  { background: var(--mai-cream); color: var(--mai-fg-2); border: 1px solid var(--mai-border); }

/* ── HOW TO CLAIM ───────────────────────────────────────── */
.imc-claim-section { padding: 80px 0; background: var(--mai-white); border-top: 1px solid var(--mai-border-soft); border-bottom: 1px solid var(--mai-border-soft); }
.imc-claim-tracks {
  display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 36px;
}
@media (max-width: 900px) { .imc-claim-tracks { grid-template-columns: 1fr; } }

.imc-claim-track {
  border-radius: 22px; padding: 28px;
  display: flex; flex-direction: column; gap: 22px;
  border: 1px solid var(--mai-border-soft);
}
.imc-claim-physical { background: linear-gradient(160deg, #FFF5E0 0%, #FFE4B5 100%); }
.imc-claim-credit   { background: linear-gradient(160deg, #F1FBF8 0%, #BFEAD9 100%); }

.imc-claim-track-head {
  display: flex; flex-direction: column; gap: 8px;
}
.imc-claim-track-tag {
  display: inline-flex; align-self: flex-start;
  padding: 4px 12px; border-radius: 9999px;
  background: var(--mai-purple); color: var(--mai-white);
  font-size: 11px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
}
.imc-claim-track-head h3 {
  font-size: clamp(20px, 2.2vw, 26px); font-weight: 800; letter-spacing: -0.02em;
  margin: 0; color: var(--mai-purple);
}
.imc-claim-track-who {
  font-size: 13px; color: var(--mai-fg-2); margin: 0; line-height: 1.5;
}
.imc-claim-track-who strong { color: var(--mai-purple); font-weight: 700; }

.imc-claim-steps {
  list-style: none; padding: 0; margin: 0;
  display: flex; flex-direction: column; gap: 14px;
  counter-reset: claim-step;
}
.imc-claim-steps li {
  display: grid; grid-template-columns: 36px 1fr; gap: 14px;
  background: rgba(255, 255, 255, 0.55);
  border-radius: 14px; padding: 16px 18px;
  align-items: flex-start;
}
.imc-claim-steps .num {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--mai-purple); color: var(--mai-white);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 15px;
}
.imc-claim-steps h4 {
  font-size: 15px; font-weight: 800; margin: 0 0 4px;
  color: var(--mai-purple); letter-spacing: -0.01em;
}
.imc-claim-steps p {
  font-size: 13px; color: var(--mai-fg-2); margin: 0; line-height: 1.5;
}
.imc-claim-steps strong { color: var(--mai-purple); font-weight: 700; }

.imc-claim-contact {
  margin-top: 28px;
  background: var(--mai-cream);
  border-radius: 16px; padding: 20px 24px;
  border: 1px solid var(--mai-border-soft);
  display: flex; align-items: center; justify-content: space-between; gap: 24px;
  flex-wrap: wrap;
}
.imc-claim-contact-text { flex: 1; min-width: 240px; }
.imc-claim-contact-cta { white-space: nowrap; }
.imc-claim-contact h4 {
  font-size: 14px; font-weight: 800; margin: 0 0 4px; color: var(--mai-purple);
}
.imc-claim-contact p {
  font-size: 13px; color: var(--mai-fg-2); margin: 0; line-height: 1.55;
}
.imc-claim-contact a {
  color: var(--mai-coral); font-weight: 700; text-decoration: none;
}
.imc-claim-contact a:hover { text-decoration: underline; }

@media (max-width: 540px) {
  .imc-claim-track { padding: 22px; }
  .imc-claim-steps li { padding: 14px; }
}

/* ── UPSELL ─────────────────────────────────────────────── */
.imc-upsell-section { padding: 80px 0; }
.imc-upsell {
  background: linear-gradient(135deg, #270F36 0%, #4A2466 100%);
  color: var(--mai-white); border-radius: 28px; padding: 56px;
  display: grid; grid-template-columns: 1.4fr 1fr; gap: 40px; align-items: center;
  position: relative; overflow: hidden;
}
.imc-upsell::before {
  content: ''; position: absolute; top: -100px; right: -100px;
  width: 360px; height: 360px; background: radial-gradient(circle, rgba(255,222,73,0.4) 0%, transparent 70%);
  pointer-events: none;
}
.imc-upsell h2 { font-size: clamp(28px, 3.5vw, 40px); font-weight: 800; line-height: 1.05; letter-spacing: -0.03em; margin: 12px 0; color: var(--mai-white); }
.imc-upsell p { font-size: 15px; opacity: 0.85; line-height: 1.55; max-width: 50ch; }
.imc-upsell .imc-eyebrow { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); color: var(--mai-white); }
.imc-upsell-actions { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
.imc-upsell-card {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px; padding: 28px; backdrop-filter: blur(12px); position: relative; z-index: 1;
}
.imc-upsell-card .price { font-size: 56px; font-weight: 800; letter-spacing: -0.04em; line-height: 1; }
.imc-upsell-card .price small { font-size: 16px; font-weight: 600; opacity: 0.7; }
.imc-upsell-card ul { list-style: none; padding: 0; margin: 20px 0 0; display: flex; flex-direction: column; gap: 10px; }
.imc-upsell-card li { font-size: 14px; display: flex; gap: 8px; align-items: flex-start; }
.imc-upsell-card li::before { content: '✓'; color: var(--mai-yellow); font-weight: 800; }
@media (max-width: 800px) {
  .imc-upsell { grid-template-columns: 1fr; padding: 36px 28px; }
}
@media (max-width: 480px) {
  .imc-upsell { padding: 28px 22px; border-radius: 22px; }
  .imc-upsell-card { padding: 22px; }
}

/* ── FAQ ────────────────────────────────────────────────── */
.imc-faq-section { padding: 80px 0; }
.imc-faq { max-width: 760px; margin: 36px auto 0; display: flex; flex-direction: column; gap: 8px; }
.imc-faq-item {
  background: var(--mai-white); border: 1px solid var(--mai-border-soft);
  border-radius: 14px; overflow: hidden;
}
.imc-faq-q {
  width: 100%; padding: 18px 22px; background: transparent; border: 0; cursor: pointer;
  display: flex; justify-content: space-between; align-items: center; gap: 16px;
  font-family: var(--mai-font); font-weight: 700; font-size: 15px; color: var(--mai-purple);
  text-align: left;
}
.imc-faq-icon { font-size: 18px; transition: transform 0.2s; flex-shrink: 0; }
.imc-faq-item[data-open="true"] .imc-faq-icon { transform: rotate(45deg); }
.imc-faq-a {
  padding: 0 22px 18px; font-size: 14px; color: var(--mai-fg-2); line-height: 1.6; max-width: 60ch;
}
.imc-faq-item:not([data-open="true"]) .imc-faq-a { display: none; }

/* ── FOOTER ─────────────────────────────────────────────── */
.imc-footer { padding: 48px 0 32px; border-top: 1px solid var(--mai-border); }
.imc-footer-inner { display: flex; justify-content: space-between; align-items: center; gap: 24px; flex-wrap: wrap; }
.imc-footer p { font-size: 12px; color: var(--mai-fg-3); margin: 0; }
.imc-footer a { color: var(--mai-fg-2); text-decoration: none; font-size: 12px; font-weight: 600; }
.imc-footer a + a { margin-left: 18px; }
</style>
</head>
